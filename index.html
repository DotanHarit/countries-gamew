<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌍 משחק מדינות העולם</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0d1b2e;
      --ocean: #0a1628;
      --country: #1e3a5f;
      --p1: #22c55e;
      --p2: #f97316;
      --panel: #1a2744;
      --border: #1e3a5f;
      --inactive: #334155;
    }

    html, body {
      background: var(--bg);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100%;
      /* height is set in JS via window.innerHeight — do NOT use 100vh/100dvh */
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .screen { display: none; width: 100%; height: 100%; }
    .screen.active { display: flex; flex-direction: column; }

    /* ---------- Screen 1: Setup ---------- */
    #setup-screen {
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      overflow-y: auto;
    }
    #setup-screen .setup-inner {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    #setup-screen h1 { font-size: 28px; line-height: 1.3; }
    #setup-screen .subtitle { font-size: 15px; color: #94a3b8; }
    .name-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 18px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--panel);
      color: #e2e8f0;
      text-align: center;
      outline: none;
    }
    .name-input:focus { border-color: var(--p1); }
    .name-input:nth-of-type(2):focus { border-color: var(--p2); }

    .btn {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      background: var(--p1);
      color: #052e16;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: var(--inactive); color: #64748b; cursor: not-allowed; }

    .mic-note {
      font-size: 13px;
      color: #f59e0b;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.5;
    }

    /* ---------- Screen 2: Game ---------- */
    #game-screen { height: 100%; }

    #header {
      flex: 0 0 auto;
      height: 52px;
      display: flex;
      align-items: stretch;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .player-tag {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 600;
      overflow: hidden;
    }
    .player-tag.p2 { flex-direction: row-reverse; }
    .player-tag .dot {
      width: 12px; height: 12px; border-radius: 50%;
      flex: 0 0 auto;
    }
    .player-tag.p1 .dot { background: var(--p1); }
    .player-tag.p2 .dot { background: var(--p2); }
    .player-tag .name {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .player-tag .score {
      font-size: 20px; font-weight: 800; min-width: 24px; text-align: center;
    }
    .player-tag.p1 .score { color: var(--p1); }
    .player-tag.p2 .score { color: var(--p2); }
    .player-tag.active {
      background: rgba(255,255,255,0.06);
    }
    .player-tag.p1.active { box-shadow: inset 0 -3px 0 var(--p1); }
    .player-tag.p2.active { box-shadow: inset 0 -3px 0 var(--p2); }

    #remaining {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      line-height: 1.1;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    #remaining #remaining-num { font-size: 18px; font-weight: 800; color: #e2e8f0; }
    #remaining .rem-label { font-size: 10px; color: #94a3b8; }

    #area-meter {
      flex: 0 0 auto;
      position: relative;
      height: 22px;
      background: var(--country);
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .area-fill {
      position: absolute;
      top: 0; bottom: 0;
      width: 0;
      transition: width .4s ease;
    }
    #area-fill1 { right: 0; background: var(--p1); }   /* player 1 grows from the right */
    #area-fill2 { left: 0;  background: var(--p2); }   /* player 2 grows from the left */
    .area-label {
      position: absolute; top: 0;
      line-height: 22px;
      font-size: 11px; font-weight: 800;
      padding: 0 8px;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,.7);
      pointer-events: none;
    }
    #area-label1 { right: 0; }
    #area-label2 { left: 0; }

    #map-wrap {
      flex: 1 1 auto;
      position: relative;
      background: var(--ocean);
      overflow: hidden;
      min-height: 0;
    }
    #map-wrap svg { display: block; width: 100%; height: 100%; }

    #panel {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 12px;
      background: var(--panel);
      border-top: 1px solid var(--border);
    }
    #input-row, #bottom-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }
    #word-input {
      flex: 1 1 auto;
      min-width: 0;
      padding: 10px 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: #0d1b2e;
      color: #e2e8f0;
      text-align: center;
      outline: none;
    }
    #word-input:focus { border-color: var(--p1); }
    #confirm-btn {
      flex: 0 0 auto;
      padding: 11px 16px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      background: var(--p1);
      color: #052e16;
      cursor: pointer;
      white-space: nowrap;
    }
    #confirm-btn:active { transform: scale(0.97); }

    #skip-btn {
      flex: 0 0 auto;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--country);
      color: #cbd5e1;
      cursor: pointer;
      white-space: nowrap;
    }
    #skip-btn:active { transform: scale(0.97); }

    #mic-btn {
      flex: 0 0 auto;
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--country);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    #mic-btn.on { animation: pulse 1.3s infinite; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
      50%     { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
    }

    #status-area {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }
    #feedback {
      display: none;
      font-size: 14px;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 8px;
      border-right: 4px solid transparent;
    }
    #feedback.show { display: block; }
    #feedback.success { background: #14532d; border-color: var(--p1); color: #bbf7d0; }
    #feedback.duplicate { background: #1e3a5f; border-color: #3b82f6; color: #bfdbfe; }
    #feedback.error { background: #450a0a; border-color: #ef4444; color: #fecaca; }
    #feedback.hint { background: #1e293b; border-color: #64748b; color: #cbd5e1; }
    #status-text {
      font-size: 14px; color: #94a3b8;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ---------- Screen 3: End ---------- */
    #end-screen {
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px;
      overflow-y: auto;
    }
    #end-screen .end-inner {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }
    #winner-banner {
      font-size: 26px; font-weight: 800; text-align: center; line-height: 1.4;
    }
    .score-compare {
      display: flex; width: 100%; gap: 12px;
    }
    .score-card {
      flex: 1;
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }
    .score-card.p1 { border-color: var(--p1); }
    .score-card.p2 { border-color: var(--p2); }
    .score-card .card-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .score-card .card-score { font-size: 40px; font-weight: 900; }
    .score-card.p1 .card-score { color: var(--p1); }
    .score-card.p2 .card-score { color: var(--p2); }

    .country-lists { display: flex; width: 100%; gap: 12px; }
    .country-col {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    .country-col h3 { font-size: 14px; margin-bottom: 8px; text-align: center; }
    .country-col.p1 h3 { color: var(--p1); }
    .country-col.p2 h3 { color: var(--p2); }
    .country-col ul { list-style: none; font-size: 14px; line-height: 1.8; }
    .country-col li {
      padding: 2px 6px; border-radius: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .country-col.p1 li { background: rgba(34,197,94,0.1); margin-bottom: 3px; }
    .country-col.p2 li { background: rgba(249,115,22,0.1); margin-bottom: 3px; }
    .country-col .empty { color: #64748b; font-size: 13px; text-align: center; }
  </style>
</head>
<body>
  <div id="app">

    <!-- ===== Screen 1: Setup ===== -->
    <section id="setup-screen" class="screen active">
      <div class="setup-inner">
        <h1>🌍 משחק מדינות העולם</h1>
        <p class="subtitle">שני שחקנים, בתורות, אומרים שמות של מדינות בקול. מי שיודע יותר — מנצח!</p>
        <input class="name-input" id="name1" type="text" placeholder="שם שחקן 1" autocomplete="off" maxlength="20">
        <input class="name-input" id="name2" type="text" placeholder="שם שחקן 2" autocomplete="off" maxlength="20">
        <button class="btn" id="start-btn" disabled>התחל משחק</button>
        <p class="mic-note">🎤 המשחק דורש גישה למיקרופון ועובד רק ב‑Chrome כשהוא מוגש דרך HTTP/HTTPS (לא מקובץ מקומי).</p>
      </div>
    </section>

    <!-- ===== Screen 2: Game ===== -->
    <section id="game-screen" class="screen">
      <div id="header">
        <div class="player-tag p1" id="tag1">
          <span class="dot"></span>
          <span class="name" id="hname1">שחקן 1</span>
          <span class="score" id="score1">0</span>
        </div>
        <div id="remaining" title="מדינות שעוד לא זוהו">
          <span id="remaining-num">177</span>
          <span class="rem-label">נותרו</span>
        </div>
        <div class="player-tag p2" id="tag2">
          <span class="dot"></span>
          <span class="name" id="hname2">שחקן 2</span>
          <span class="score" id="score2">0</span>
        </div>
      </div>

      <div id="area-meter" title="אחוז שטח היבשה שנצבר לכל שחקן">
        <div id="area-fill1" class="area-fill"></div>
        <div id="area-fill2" class="area-fill"></div>
        <span id="area-label1" class="area-label">0%</span>
        <span id="area-label2" class="area-label">0%</span>
      </div>

      <div id="map-wrap"></div>

      <div id="panel">
        <div id="input-row">
          <button id="mic-btn" aria-label="מיקרופון">🎤</button>
          <input id="word-input" type="text" autocomplete="off" placeholder="אמור/י או הקלד/י שם של מדינה">
          <button id="confirm-btn">אשר ✓</button>
        </div>
        <div id="bottom-row">
          <div id="status-area">
            <div id="feedback"></div>
            <div id="status-text">לחץ על המיקרופון כדי להתחיל</div>
          </div>
          <button id="skip-btn" aria-label="דלג תור">דלג ⏭</button>
        </div>
      </div>
    </section>

    <!-- ===== Screen 3: End ===== -->
    <section id="end-screen" class="screen">
      <div class="end-inner">
        <div id="winner-banner"></div>
        <div class="score-compare">
          <div class="score-card p1">
            <div class="card-name" id="end-name1">שחקן 1</div>
            <div class="card-score" id="end-score1">0</div>
          </div>
          <div class="score-card p2">
            <div class="card-name" id="end-name2">שחקן 2</div>
            <div class="card-score" id="end-score2">0</div>
          </div>
        </div>
        <div class="country-lists">
          <div class="country-col p1">
            <h3 id="list-title1">שחקן 1</h3>
            <ul id="list1"></ul>
          </div>
          <div class="country-col p2">
            <h3 id="list-title2">שחקן 2</h3>
            <ul id="list2"></ul>
          </div>
        </div>
        <button class="btn" id="newgame-btn">משחק חדש</button>
      </div>
    </section>

  </div>

  <!-- D3.js v7 from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

    window.addEventListener('resize', setVH);

      "טייוואן": "Taiwan", "טייואן": "Taiwan",
      "טג'יקיסטן": "Tajikistan",
      "תאילנד": "Thailand", "תאילנד": "Thailand",
      "איי בהאמה": "The Bahamas", "בהאמה": "The Bahamas", "בהאמס": "The Bahamas",
      "טוגו": "Togo",
      "טרינידד וטובגו": "Trinidad and Tobago", "טרינידד": "Trinidad and Tobago",
      "תוניסיה": "Tunisia", "טוניסיה": "Tunisia",
      "טורקיה": "Turkey", "תורכיה": "Turkey",
      "טורקמניסטן": "Turkmenistan",
      "ארצות הברית": "USA", "אמריקה": "USA", "ארה\"ב": "USA", "ארהב": "USA",
      "אוגנדה": "Uganda",
      "אוקראינה": "Ukraine",
      "איחוד האמירויות": "United Arab Emirates", "אמירויות": "United Arab Emirates", "איחוד האמירויות הערביות": "United Arab Emirates",
      "טנזניה": "United Republic of Tanzania",
      "אורוגוואי": "Uruguay", "אורוגווי": "Uruguay",
      "אוזבקיסטן": "Uzbekistan",
      "ונואטו": "Vanuatu",
      "ונצואלה": "Venezuela",
      "וייטנאם": "Vietnam", "ויאטנם": "Vietnam",
      "הגדה המערבית": "West Bank", "גדה מערבית": "West Bank",
      "סהרה המערבית": "Western Sahara", "מערב סהרה": "Western Sahara",
      "תימן": "Yemen",
      "זמביה": "Zambia",
      "זימבבואה": "Zimbabwe", "זימבבוה": "Zimbabwe"
    };

    // Reverse map: English → first Hebrew name (used for display).
    const E2H = {};
    Object.entries(H2E).forEach(([h, e]) => { if (!E2H[e]) E2H[e] = h; });

    // ===== Normalization & lookup =====
    function norm(text) {
      return text
        .replace(/[׳']/g, "'")   // normalize Hebrew apostrophes (geresh)
        .replace(/[״"]/g, '"')   // normalize Hebrew quotes (gershayim)
        .trim()
        .toLowerCase();
    }

    function findCountry(spoken) {
      const n = norm(spoken);
      if (!n) return null;
      // 1. Exact match
      for (const [heb, eng] of Object.entries(H2E)) {
        if (norm(heb) === n) return eng;
      }
      // 2. Substring match (spoken contains Hebrew name, or Hebrew name contains spoken)
      for (const [heb, eng] of Object.entries(H2E)) {
        const nh = norm(heb);
        if (n.includes(nh) || nh.includes(n)) return eng;
      }
      return null;
    }

    // ===== Map rendering (D3) =====
    const COLORS = ['#22c55e', '#f97316'];   // player 1 green, player 2 orange
    const MAP_DEFAULT_FILL = '#1e3a5f';
    let geoData = null;                        // loaded GeoJSON FeatureCollection
    let areaByName = {};                       // English name -> spherical area (steradians)
    let totalArea = 0;                         // sum of all countries' areas

    // Precompute each country's land area (d3.geoArea) and the total.
    function computeAreas() {
      areaByName = {};
      totalArea = 0;
      if (!geoData) return;
      for (const f of geoData.features) {
        const a = d3.geoArea(f);
        areaByName[f.properties.name] = a;
        totalArea += a;
      }
    }

    // Fetch the world GeoJSON once, up front.
    function loadGeo() {
      return fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson')
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(data => {
          geoData = data;
          computeAreas();
          if (isGameActive()) updateHeader();   // refresh meter if geo arrived after game start
          return data;
        });
    }

    // Draw the SVG map into #map-wrap, sized to the container.
    function drawMap() {
      const wrap = document.getElementById('map-wrap');
      if (!geoData) return;

      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      // Container not laid out yet — retry shortly.
      if (!w || !h) { setTimeout(drawMap, 80); return; }

      // Clear any previous render (e.g. on resize / new game).
      wrap.innerHTML = '';

      const projection = d3.geoNaturalEarth1()
        .scale(w / 6.3)
        .translate([w / 2, h / 2]);
      const path = d3.geoPath().projection(projection);

      const svg = d3.select(wrap).append('svg')
        .attr('width', w)
        .attr('height', h)
        .attr('viewBox', `0 0 ${w} ${h}`);

      svg.selectAll('path')
        .data(geoData.features)
        .enter()
        .append('path')
        .attr('d', path)
        .attr('data-n', d => d.properties.name)
        .attr('fill', MAP_DEFAULT_FILL)
        .attr('stroke', '#0a1628')
        .attr('stroke-width', 0.4);

      // Re-apply colors for countries already named (after resize / redraw).
      if (typeof guessed !== 'undefined') {
        for (let p = 0; p < 2; p++) {
          Object.keys(guessed[p]).forEach(eng => colorCountry(eng, p));
        }
      }
    }

    // Color a country's path(s) for the given player.
    function colorCountry(engName, playerIndex) {
      document.querySelectorAll(`[data-n="${engName}"]`)
        .forEach(el => el.setAttribute('fill', COLORS[playerIndex]));
    }

    // Schedule a map draw after the game screen is visible & laid out.
    function scheduleDrawMap() {
      requestAnimationFrame(() => requestAnimationFrame(() => drawMap()));
    }

    // Redraw the map on resize when the game screen is active.
    window.addEventListener('resize', () => {
      if (document.getElementById('game-screen').classList.contains('active')) {
        drawMap();
      }
    });

    // Kick off the GeoJSON fetch immediately so it's ready by game start.
    loadGeo().catch(err => console.error('Failed to load map data:', err));

    // ===== Game state =====
    let playerNames = ['', ''];      // [player1Name, player2Name]
    let currentPlayer = 0;           // 0 or 1
    let guessed = [{}, {}];          // guessed[p][engName] = true (a country can be taken once, by either player)
    let consecutiveSkips = 0;        // skips in a row (2 in a row ends the game)
    let recognition = null;          // SpeechRecognition instance
    let listening = false;
    let turnResolved = false;        // true once the current turn ends (success / skip)
    let recognitionBlocked = false;  // true after a not-allowed mic error
    let awaitingConfirm = false;     // a spoken word is waiting in the box for confirm/edit

    const wordInput = document.getElementById('word-input');
    const confirmBtn = document.getElementById('confirm-btn');

    // ===== Small UI helpers =====
    function setStatus(msg) {
      document.getElementById('status-text').textContent = msg;
    }
    function showFeedback(type, msg) {
      const fb = document.getElementById('feedback');
      fb.className = '';
      fb.classList.add(type, 'show');
      fb.textContent = msg;
    }
    function clearFeedback() {
      const fb = document.getElementById('feedback');
      fb.className = '';
      fb.textContent = '';
    }
    function updateHeader() {
      const named = Object.keys(guessed[0]).length + Object.keys(guessed[1]).length;
      const total = geoData ? geoData.features.length : 177;
      document.getElementById('score1').textContent = Object.keys(guessed[0]).length;
      document.getElementById('score2').textContent = Object.keys(guessed[1]).length;
      document.getElementById('remaining-num').textContent = Math.max(0, total - named);
      document.getElementById('tag1').classList.toggle('active', currentPlayer === 0);
      document.getElementById('tag2').classList.toggle('active', currentPlayer === 1);
      updateAreaMeter();
    }

    // Percentage of total land area held by player p (by claimed countries).
    function playerAreaPct(p) {
      if (!totalArea) return 0;
      let s = 0;
      for (const eng of Object.keys(guessed[p])) s += (areaByName[eng] || 0);
      return s / totalArea * 100;
    }
    function updateAreaMeter() {
      const p1 = playerAreaPct(0), p2 = playerAreaPct(1);
      document.getElementById('area-fill1').style.width = p1 + '%';
      document.getElementById('area-fill2').style.width = p2 + '%';
      document.getElementById('area-label1').textContent = (p1 < 10 ? p1.toFixed(1) : Math.round(p1)) + '%';
      document.getElementById('area-label2').textContent = (p2 < 10 ? p2.toFixed(1) : Math.round(p2)) + '%';
    }
    function updateMic() {
      const mic = document.getElementById('mic-btn');
      if (listening) {
        mic.classList.add('on');
        mic.style.background = COLORS[currentPlayer];
      } else {
        mic.classList.remove('on');
        mic.style.background = '';
      }
    }

    // ===== Speech recognition =====
    function setupRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { recognition = null; return; }
      recognition = new SR();
      recognition.lang = 'he-IL';
      recognition.continuous = true;      // keep listening until the player succeeds / skips
      recognition.interimResults = true;
      recognition.maxAlternatives = 5;

      recognition.onresult = (e) => {
        if (turnResolved) return;
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const res = e.results[i];
          if (res.isFinal) {
            // Put the recognized word in the box for review/edit — do NOT auto-submit.
            const text = (res[0].transcript || '').trim();
            if (text) {
              wordInput.value = text;
              awaitingConfirm = true;
              setStatus('בדוק/י את המילה, ערוך/י אם צריך, ולחץ/י אשר ✓');
              stopListening();   // pause mic so the text isn't overwritten while editing
            }
            return;
          } else {
            // Live transcript preview straight into the box.
            wordInput.value = (res[0].transcript || '').trim();
            setStatus('🎤 מקשיב...');
          }
        }
      };

      recognition.onerror = (e) => {
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
          recognitionBlocked = true;
          showFeedback('error', 'אין גישה למיקרופון — צריך לפתוח דרך HTTPS ולאשר מיקרופון, ואז ללחוץ על 🎤');
          setStatus('שגיאת מיקרופון');
        } else if (e.error === 'no-speech' || e.error === 'aborted') {
          // common, not a real error — stay silent; onend will relisten
        } else {
          showFeedback('error', 'שגיאה: ' + e.error);
        }
      };

      recognition.onend = () => {
        listening = false;
        updateMic();
        // Recognition stopped (silence/network). Relisten only if we're not
        // waiting on a confirm and the turn isn't over.
        if (!turnResolved && !recognitionBlocked && !awaitingConfirm && isGameActive()) {
          setTimeout(safeStartListen, 150);
        }
      };
    }

    function isGameActive() {
      return document.getElementById('game-screen').classList.contains('active');
    }
    function safeStartListen() {
      if (!recognition || turnResolved || recognitionBlocked || awaitingConfirm || !isGameActive()) return;
      try { recognition.start(); listening = true; updateMic(); }
      catch (e) { /* already started */ }
    }
    // Gracefully pause the mic without ending the turn (used while awaiting confirm).
    function stopListening() {
      if (recognition) { try { recognition.stop(); } catch (e) {} }
      listening = false;
      updateMic();
    }
    function stopRecognition() {
      if (recognition) { try { recognition.abort(); } catch (e) {} }
      listening = false;
      updateMic();
    }

    // ===== Turn flow =====
    // Process the confirmed/edited word from the input box.
    function processWord(rawText) {
      if (turnResolved) return;
      const text = (rawText || '').trim();
      if (!text) {
        setStatus('אמור/י או הקלד/י שם של מדינה, ואז אשר/י');
        return;
      }

      const found = findCountry(text);

      if (!found) {
        // Understood a word but it isn't a country — keep it for editing.
        showFeedback('hint', `הבנתי "${text}" — זו לא מדינה שאני מזהה, ערוך/י ונסה/י שוב`);
        return;
      }

      if (guessed[0][found] || guessed[1][found]) {
        // A country can be marked only once (by either player).
        showFeedback('duplicate', `${E2H[found]} כבר סומנה! בחר/י מדינה אחרת`);
        wordInput.value = '';
        return;
      }

      // Success — only now does the turn pass to the other player.
      turnResolved = true;
      awaitingConfirm = false;
      consecutiveSkips = 0;
      guessed[currentPlayer][found] = true;
      colorCountry(found, currentPlayer);
      updateHeader();
      showFeedback('success', `✅ ${E2H[found]}`);
      wordInput.value = '';
      stopRecognition();
      setTimeout(() => { clearFeedback(); nextTurn(); }, 1100);
    }

    // Player voluntarily passes their turn. Two skips in a row ends the game.
    function skipTurn() {
      if (!isGameActive() || turnResolved) return;
      turnResolved = true;
      stopRecognition();
      consecutiveSkips++;
      if (consecutiveSkips >= 2) {
        setStatus('המשחק הסתיים');
        showFeedback('error', 'שני השחקנים דילגו — המשחק נגמר');
        setTimeout(showEndScreen, 500);
      } else {
        showFeedback('duplicate', `${playerNames[currentPlayer]} דילג/ה — תור ${playerNames[1 - currentPlayer]}`);
        setTimeout(() => { clearFeedback(); nextTurn(); }, 800);
      }
    }

    function startTurn() {
      turnResolved = false;
      recognitionBlocked = false;
      awaitingConfirm = false;
      wordInput.value = '';
      clearFeedback();
      setStatus(`${playerNames[currentPlayer]}, תורך! אמור/י שם של מדינה ואשר/י`);
      updateHeader();
      safeStartListen();
    }

    function nextTurn() {
      currentPlayer = 1 - currentPlayer;
      startTurn();
    }

    function startGame() {
      playerNames = [name1El.value.trim(), name2El.value.trim()];
      currentPlayer = 0;
      guessed = [{}, {}];
      consecutiveSkips = 0;
      turnResolved = false;
      recognitionBlocked = false;
      document.getElementById('hname1').textContent = playerNames[0];
      document.getElementById('hname2').textContent = playerNames[1];
      showScreen('game-screen');
      updateHeader();
      setupRecognition();
      scheduleDrawMap();
      startTurn();
    }

    // Wire up buttons
    startBtn.addEventListener('click', startGame);
    document.getElementById('mic-btn').addEventListener('click', () => {
      if (!isGameActive() || turnResolved) return;
      // (Re-)record: clear the box and listen again.
      recognitionBlocked = false;
      awaitingConfirm = false;
      wordInput.value = '';
      clearFeedback();
      setStatus('🎤 מקשיב...');
      safeStartListen();
    });
    confirmBtn.addEventListener('click', () => processWord(wordInput.value));
    wordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); processWord(wordInput.value); }
    });
    document.getElementById('skip-btn').addEventListener('click', skipTurn);

    // ===== End screen =====
    function showEndScreen() {
      stopRecognition();

      const s0 = Object.keys(guessed[0]).length;
      const s1 = Object.keys(guessed[1]).length;

      // Winner banner
      const banner = document.getElementById('winner-banner');
      if (s0 > s1) {
        banner.textContent = `🏆 ${playerNames[0]} ניצח/ה!`;
        banner.style.color = COLORS[0];
      } else if (s1 > s0) {
        banner.textContent = `🏆 ${playerNames[1]} ניצח/ה!`;
        banner.style.color = COLORS[1];
      } else {
        banner.textContent = '🤝 תיקו!';
        banner.style.color = '#e2e8f0';
      }

      // Score cards
      document.getElementById('end-name1').textContent = playerNames[0];
      document.getElementById('end-name2').textContent = playerNames[1];
      document.getElementById('end-score1').textContent = s0;
      document.getElementById('end-score2').textContent = s1;

      // Country lists (Hebrew display names)
      fillCountryList('list1', 'list-title1', 0, s0);
      fillCountryList('list2', 'list-title2', 1, s1);

      showScreen('end-screen');
    }

    function fillCountryList(listId, titleId, playerIndex, count) {
      document.getElementById(titleId).textContent = `${playerNames[playerIndex]} (${count})`;
      const ul = document.getElementById(listId);
      ul.innerHTML = '';
      const names = Object.keys(guessed[playerIndex])
        .map(eng => E2H[eng] || eng)
        .sort((a, b) => a.localeCompare(b, 'he'));
      if (names.length === 0) {
        const li = document.createElement('li');
        li.className = 'empty';
        li.textContent = '— אין —';
        ul.appendChild(li);
        return;
      }
      names.forEach(h => {
        const li = document.createElement('li');
        li.textContent = h;
        ul.appendChild(li);
      });
    }

    // ===== New game =====
    function newGame() {
      stopRecognition();
      currentPlayer = 0;
      guessed = [{}, {}];
      consecutiveSkips = 0;
      turnResolved = true;
      recognitionBlocked = false;
      awaitingConfirm = false;
      wordInput.value = '';
      clearFeedback();
      setStatus('לחץ על המיקרופון כדי להתחיל');
      showScreen('setup-screen');
      refreshStartBtn();
    }
    document.getElementById('newgame-btn').addEventListener('click', newGame);
  </script>
