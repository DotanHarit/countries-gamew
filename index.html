<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌍 משחק מדינות העולם</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0d1b2e;
      --ocean: #0a1628;
      --country: #1e3a5f;
      --p1: #22c55e;
      --p2: #f97316;
      --panel: #1a2744;
      --border: #1e3a5f;
      --inactive: #334155;
    }

    html, body {
      background: var(--bg);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100%;
      /* height is set in JS via window.innerHeight — do NOT use 100vh/100dvh */
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .screen { display: none; width: 100%; height: 100%; }
    .screen.active { display: flex; flex-direction: column; }

    /* ---------- Screen 1: Setup ---------- */
    #setup-screen {
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      overflow-y: auto;
    }
    #setup-screen .setup-inner {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    #setup-screen h1 { font-size: 28px; line-height: 1.3; }
    #setup-screen .subtitle { font-size: 15px; color: #94a3b8; }
    .name-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 18px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--panel);
      color: #e2e8f0;
      text-align: center;
      outline: none;
    }
    .name-input:focus { border-color: var(--p1); }
    .name-input:nth-of-type(2):focus { border-color: var(--p2); }

    .btn {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      background: var(--p1);
      color: #052e16;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: var(--inactive); color: #64748b; cursor: not-allowed; }

    .mic-note {
      font-size: 13px;
      color: #f59e0b;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.5;
    }

    /* ---------- Screen 2: Game ---------- */
    #game-screen { height: 100%; }

    #header {
      flex: 0 0 auto;
      height: 52px;
      display: flex;
      align-items: stretch;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .player-tag {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 600;
      overflow: hidden;
    }
    .player-tag.p2 { flex-direction: row-reverse; }
    .player-tag .dot {
      width: 12px; height: 12px; border-radius: 50%;
      flex: 0 0 auto;
    }
    .player-tag.p1 .dot { background: var(--p1); }
    .player-tag.p2 .dot { background: var(--p2); }
    .player-tag .name {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .player-tag .score {
      font-size: 20px; font-weight: 800; min-width: 24px; text-align: center;
    }
    .player-tag.p1 .score { color: var(--p1); }
    .player-tag.p2 .score { color: var(--p2); }
    .player-tag.active {
      background: rgba(255,255,255,0.06);
    }
    .player-tag.p1.active { box-shadow: inset 0 -3px 0 var(--p1); }
    .player-tag.p2.active { box-shadow: inset 0 -3px 0 var(--p2); }

    #map-wrap {
      flex: 1 1 auto;
      position: relative;
      background: var(--ocean);
      overflow: hidden;
      min-height: 0;
    }
    #map-wrap svg { display: block; width: 100%; height: 100%; }

    #panel {
      flex: 0 0 auto;
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      background: var(--panel);
      border-top: 1px solid var(--border);
    }

    #countdown { flex: 0 0 auto; }

    #mic-btn {
      flex: 0 0 auto;
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--country);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    #mic-btn.on { animation: pulse 1.3s infinite; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
      50%     { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
    }

    #status-area {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }
    #feedback {
      display: none;
      font-size: 14px;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 8px;
      border-right: 4px solid transparent;
    }
    #feedback.show { display: block; }
    #feedback.success { background: #14532d; border-color: var(--p1); color: #bbf7d0; }
    #feedback.duplicate { background: #1e3a5f; border-color: #3b82f6; color: #bfdbfe; }
    #feedback.error { background: #450a0a; border-color: #ef4444; color: #fecaca; }
    #status-text {
      font-size: 14px; color: #94a3b8;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ---------- Screen 3: End ---------- */
    #end-screen {
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px;
      overflow-y: auto;
    }
    #end-screen .end-inner {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }
    #winner-banner {
      font-size: 26px; font-weight: 800; text-align: center; line-height: 1.4;
    }
    .score-compare {
      display: flex; width: 100%; gap: 12px;
    }
    .score-card {
      flex: 1;
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }
    .score-card.p1 { border-color: var(--p1); }
    .score-card.p2 { border-color: var(--p2); }
    .score-card .card-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .score-card .card-score { font-size: 40px; font-weight: 900; }
    .score-card.p1 .card-score { color: var(--p1); }
    .score-card.p2 .card-score { color: var(--p2); }

    .country-lists { display: flex; width: 100%; gap: 12px; }
    .country-col {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    .country-col h3 { font-size: 14px; margin-bottom: 8px; text-align: center; }
    .country-col.p1 h3 { color: var(--p1); }
    .country-col.p2 h3 { color: var(--p2); }
    .country-col ul { list-style: none; font-size: 14px; line-height: 1.8; }
    .country-col li {
      padding: 2px 6px; border-radius: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .country-col.p1 li { background: rgba(34,197,94,0.1); margin-bottom: 3px; }
    .country-col.p2 li { background: rgba(249,115,22,0.1); margin-bottom: 3px; }
    .country-col .empty { color: #64748b; font-size: 13px; text-align: center; }
  </style>
</head>
<body>
  <div id="app">

    <!-- ===== Screen 1: Setup ===== -->
    <section id="setup-screen" class="screen active">
      <div class="setup-inner">
        <h1>🌍 משחק מדינות העולם</h1>
        <p class="subtitle">שני שחקנים, בתורות, אומרים שמות של מדינות בקול. מי שיודע יותר — מנצח!</p>
        <input class="name-input" id="name1" type="text" placeholder="שם שחקן 1" autocomplete="off" maxlength="20">
        <input class="name-input" id="name2" type="text" placeholder="שם שחקן 2" autocomplete="off" maxlength="20">
        <button class="btn" id="start-btn" disabled>התחל משחק</button>
        <p class="mic-note">🎤 המשחק דורש גישה למיקרופון ועובד רק ב‑Chrome כשהוא מוגש דרך HTTP/HTTPS (לא מקובץ מקומי).</p>
      </div>
    </section>

    <!-- ===== Screen 2: Game ===== -->
    <section id="game-screen" class="screen">
      <div id="header">
        <div class="player-tag p1" id="tag1">
          <span class="dot"></span>
          <span class="name" id="hname1">שחקן 1</span>
          <span class="score" id="score1">0</span>
        </div>
        <div class="player-tag p2" id="tag2">
          <span class="dot"></span>
          <span class="name" id="hname2">שחקן 2</span>
          <span class="score" id="score2">0</span>
        </div>
      </div>

      <div id="map-wrap"></div>

      <div id="panel">
        <div id="countdown">
          <svg width="52" height="52">
            <circle cx="26" cy="26" r="20" fill="none" stroke="#1e293b" stroke-width="4"/>
            <circle id="cdarc" cx="26" cy="26" r="20" fill="none"
              stroke="#22c55e" stroke-width="4"
              stroke-dasharray="125.7"
              stroke-dashoffset="0"
              stroke-linecap="round"
              transform="rotate(-90 26 26)"/>
            <text id="cdtxt" x="26" y="31" text-anchor="middle"
              fill="white" font-size="14" font-weight="bold">5</text>
          </svg>
        </div>
        <button id="mic-btn" aria-label="מיקרופון">🎤</button>
        <div id="status-area">
          <div id="feedback"></div>
          <div id="status-text">לחץ על המיקרופון כדי להתחיל</div>
        </div>
      </div>
    </section>

    <!-- ===== Screen 3: End ===== -->
    <section id="end-screen" class="screen">
      <div class="end-inner">
        <div id="winner-banner"></div>
        <div class="score-compare">
          <div class="score-card p1">
            <div class="card-name" id="end-name1">שחקן 1</div>
            <div class="card-score" id="end-score1">0</div>
          </div>
          <div class="score-card p2">
            <div class="card-name" id="end-name2">שחקן 2</div>
            <div class="card-score" id="end-score2">0</div>
          </div>
        </div>
        <div class="country-lists">
          <div class="country-col p1">
            <h3 id="list-title1">שחקן 1</h3>
            <ul id="list1"></ul>
          </div>
          <div class="country-col p2">
            <h3 id="list-title2">שחקן 2</h3>
            <ul id="list2"></ul>
          </div>
        </div>
        <button class="btn" id="newgame-btn">משחק חדש</button>
      </div>
    </section>

  </div>

  <!-- D3.js v7 from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
    // ===== App height fix (mobile) — set in JS, not CSS vh =====
    function setVH() {
      document.getElementById('app').style.height = window.innerHeight + 'px';
    }
    setVH();
    window.addEventListener('resize', setVH);

    // Screen navigation helper
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ---- Setup screen wiring (start button enable/disable) ----
    const name1El = document.getElementById('name1');
    const name2El = document.getElementById('name2');
    const startBtn = document.getElementById('start-btn');
    function refreshStartBtn() {
      startBtn.disabled = !(name1El.value.trim() && name2El.value.trim());
    }
    name1El.addEventListener('input', refreshStartBtn);
    name2El.addEventListener('input', refreshStartBtn);

    // Remaining game logic (dictionary, map, voice, turns) added in later steps.
  </script>
</body>
</html>
